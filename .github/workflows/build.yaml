name: Tests and package CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Run tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Run tests
        run: pytest
      - name: Export OpenAPI schema
        run: python scripts/export_openapi.py
      - name: Commit OpenAPI schema
        run: |
          git config user.name "GitHub Actions"
          git config user.email "ci@github.com"
          git add openapi.yaml
          git commit -m "Update OpenAPI schema" || echo "No changes to commit"
          git push



  build:
    runs-on: ubuntu-latest
    name: Build package
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tags
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO=$REPO" >> $GITHUB_OUTPUT
          echo "VERSION=0.1.0" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.meta.outputs.REPO }}:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ steps.meta.outputs.REPO }}:latest
      
