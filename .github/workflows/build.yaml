name: Tests and package CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  test:
    runs-on: ubuntu-latest
    name: Run tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - run: pip install ".[dev]"
      - run: pytest

  build:
    runs-on: ubuntu-latest
    name: Build package
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        run: |
          echo "VERSION=$(python -c 'import physense_api; print(physense_api.__version__)')" >> $GITHUB_OUTPUT  

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linus/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      