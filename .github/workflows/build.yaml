name: Tests and package CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Run tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Run tests
        run: pytest
      - name: Export OpenAPI schema
        run: python scripts/export_openapi.py
      - name: Commit OpenAPI schema
        run: |
          git config user.name "GitHub Actions"
          git config user.email "ci@github.com"
          git add openapi.yaml
          git commit -m "Update OpenAPI schema" || echo "No changes to commit"
          git push



  build:
    runs-on: ubuntu-latest
    name: Build package
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/physense-api
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image cache scope so api and web don't clobber each other.
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Kubernetes
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: Tampipo/physense-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Install kustomize
        run: |
          curl -sLo k.tgz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar xzf k.tgz && sudo mv kustomize /usr/local/bin/

      - name: Bump image tags
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG="sha-${GITHUB_SHA::7}"   # main -> rolling sha (matches type=sha,format=short)
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          cd "gitops/apps/physense-api" \
            && kustomize edit set image "ghcr.io/$OWNER/physense-api=ghcr.io/$OWNER/physense-api:$TAG"


      - name: Commit and push changes
        run: |
          cd gitops 
          git diff --quiet && { echo "no image change"; exit 0; }
          git config user.name "github-actions[bot]" 
          git config user.email "github-actions[bot]@users.noreply.github.com" 
          git commit -am "deploy: tarot images ${TAG}"
          git push
